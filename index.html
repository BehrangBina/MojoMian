<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mojo Graphic Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/header.css">
</head>
<body>
  <header class="site-header" id="top">
    <a class="logo-link" href="#top" aria-label="Mojo graphic design home">
      <img class="logo" src="src/img/Logo.svg" alt="Mojo Graphic Design">
    </a>

    <nav class="primary-nav" aria-label="Primary navigation">
      <a class="back-to-top" href="#top" aria-label="Back to top">
        <img src="src/img/Icon-Up.png" alt="">
      </a>

      <div class="nav-menu">
        <a href="#about">About me</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Contact me</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="home-section" aria-labelledby="home-title">
      <div class="home-content">
        <h1 id="home-title">Thoughtful Branding. Timeless Design. Lasting Impact.</h1>
        <a class="main-button" href="#portfolio">See My Works</a>
      </div>
    </section>

    <section id="about" class="placeholder-section"></section>
    <section id="portfolio" class="placeholder-section alt"></section>
    <section id="contact" class="placeholder-section"></section>
  </main>

  <script src="src/js/header.js"></script>
</body>
</html>
